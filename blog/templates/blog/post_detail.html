{% extends 'base.html' %}
{% block content %}
<div class="container my-5">

    <article>
        <h1 class="mb-3">{{post.title}}</h1>

        <p class="text-muted">{{post.pub_date}}</p>

        <img src="https://via.placeholder.com/800x400" class="img-fluid rounded mb-4" alt="Post Image">

        <p>
            {{post.body}}
        </p>

    </article>

    <hr>

    <a href="{% url 'blog:home' %}" class="btn btn-secondary">← Back to Home</a>

</div>
{% endblock %}
