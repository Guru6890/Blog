{% extends "base.html" %}

{% block content %}

<div class="container section">
    <h1 class="mb-4">Blog</h1>

    {% for post in posts %}
    <div class="mb-4">
        <h3>{{ post.title }}</h3>
        <p class="text-muted">{{ post.created_at }}</p>

        <p>{{ post.content|truncatewords:30 }}</p>

        <a href="{% url 'post_detail' post.id %}" class="btn btn-outline-primary btn-sm">Read More</a>
    </div>
    <hr>
    {% endfor %}

</div>

{% endblock %}
